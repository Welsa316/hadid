<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon-512.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f0f10" />
    <meta name="description" content="Offline-first workout tracker for strength training" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Hadid" />
    <title>Hadid</title>
    <style>
      html {
        background-color: #0f0f10;
      }
      html[data-theme='light'] {
        background-color: #f6f6f7;
      }
    </style>
    <script>
      // Apply the saved theme before first paint to avoid a flash of the
      // wrong theme. The full settings store re-reads this later.
      ;(function () {
        try {
          var t = localStorage.getItem('hadid:theme')
          if (t === 'light' || t === 'dark') document.documentElement.dataset.theme = t
        } catch (e) {
          /* localStorage unavailable — fall back to the default theme */
        }
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
